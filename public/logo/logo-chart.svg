<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Bar-chart brand mark: three ascending bars + a coin sitting on top of
       the tallest one, suggesting "money going up". Single colour, fully
       paths so sharp can render it to PNG without a font dependency. -->
  <g fill="#00A76F">
    <!-- Bars, left to right ascending. Rounded tops (rx=16) soften the silhouette. -->
    <rect x="64"  y="304" width="96" height="144" rx="16"/>
    <rect x="208" y="224" width="96" height="224" rx="16"/>
    <rect x="352" y="144" width="96" height="304" rx="16"/>
    <!-- Coin sitting just above the tallest bar — same accent the $ logo uses. -->
    <circle cx="400" cy="96" r="40"/>
  </g>
</svg>
